$kind: http-request
name: Remove from Favorites
method: DELETE
url: '{{base_url}}/api/favorites/'
order: 3000
headers:
  - key: Authorization
    value: 'Token {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "location_id": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204", function () {
        pm.response.to.have.status(204);
      });
