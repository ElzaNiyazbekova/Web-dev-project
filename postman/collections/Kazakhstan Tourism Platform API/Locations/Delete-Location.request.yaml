$kind: http-request
name: Delete Location
method: DELETE
url: '{{base_url}}/api/locations/{{location_id}}/'
order: 5000
headers:
  - key: Authorization
    value: 'Token {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204", function () {
        pm.response.to.have.status(204);
      });
